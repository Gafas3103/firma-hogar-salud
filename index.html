                    // update simulado
                    return { ok: true, json: async () => ({}) };
                }
                const filterMatch = url.match(/cre3c_numero_de_documento eq '(\d+)'/);
                if (filterMatch) {
                    const cedula = filterMatch[1];
                    const encontrado = mockEmpleadosDirectos.find(e => e.cre3c_numero_de_documento === cedula);
                    return { ok: true, json: async () => ({ value: encontrado ? [encontrado] : [] }) };

                return { ok: true, json: async () => ({ value: mockEmpleadosDirectos }) };

                }
                return { ok: true, json: async () => ({ value: mockEmpleadosIndirectos }) };
            }
            if (url.includes('/cr83c_contratoses')) {
                if (options.method === 'POST') {
                    const body = JSON.parse(options.body);
                    const newId = "cnt-" + Date.now();
                    let contrato = { cr83c_contratosid: newId, ...body };
                    mockContratos.push(contrato);
                    return { ok: true, headers: { get: () => `(${newId})` }, json: async () => ({}) };
                }
                if (options.method === 'PATCH') {
                    const idMatch = url.match(/cr83c_contratoses\(([^)]+)\)/);
                    if (idMatch) {

                        const patchData = JSON.parse(options.body);

                    <h3 style={{textAlign:'center',fontSize:'13px',fontWeight:'bold',margin:'0 0 20px',textTransform:'uppercase',letterSpacing:'0.5px'}}>OBRA O LABOR CONTRATADA</h3>
                    <table style={{width:'100%',borderCollapse:'collapse',marginBottom:'20px'}}><tbody>{campos.map(([l,v],i)=><TR key={i} l={l} v={v} i={i}/>)}</tbody></table>
                    <p>Entre el empleador y el trabajador, de las condiciones ya dichas identificados como aparece al pie de sus correspondientes firmas se ha celebrado el presente contrato individual de trabajo, regido además por las siguientes cláusulas:</p>
                    <p><strong>Primera.</strong> El empleador contrata los servicios personales del trabajador y este se obliga: a) A poner al servicio del empleador toda su capacidad normal de trabajo, en forma exclusiva en el desempeño de las funciones propias del oficio mencionado y las labores anexas y complementarias del mismo, de conformidad con las órdenes e instrucciones que le imparta el empleador o sus representantes, y b) A no prestar directa ni indirectamente servicios laborales a otros empleadores, ni a trabajar por cuenta propia en el mismo oficio, durante la vigencia de este contrato.</p>
                    <p><strong>Segunda.</strong> El empleador paga al trabajador por la prestación de sus servicios el salario indicado, pagadero en las oportunidades también señaladas arriba. Dentro de este pago se encuentra incluida la remuneración de los descansos dominicales y festivos de que tratan los capítulos I y II del título VII del Código Sustantivo del Trabajo. Se aclara y se conviene que en los casos en los que el trabajador devengue comisiones o cualquier otra modalidad de salario variable, el 82.5% de dichos ingresos, constituye remuneración ordinaria y el 17.5% restante está designado a remunerar el descanso en los días dominicales y festivos.</p>
                    <p><strong>Tercera.</strong> Todo trabajo suplementario o en horas extras y todo trabajo en domingo o festivo en los que legalmente debe concederse el descanso, se remunerará conforme a la Ley, así como los correspondientes recargos nocturnos. Para el reconocimiento y pago del trabajo suplementario, dominical o festivo el empleador o sus representantes deben autorizarlo previamente por escrito.</p>

            const POR_PAG = 10;

            const [modalGenerar, setModalGenerar] = useState(false);
            const [modalVer, setModalVer] = useState(null);
            const [guardando, setGuardando] = useState(false);
            const [enviando, setEnviando] = useState(false);
            const [busqCedula, setBusqCedula] = useState('');
            const [buscando, setBuscando] = useState(false);
            const [modalRechazar, setModalRechazar] = useState(false);
            const [contratoRech, setContratoRech] = useState(null);
            const [motivo, setMotivo] = useState('');
            const [rechazando, setRechazando] = useState(false);

            const FORM0 = {
                idDataverse:'',tablaOrigen:'',cedula:'',nombreCompleto:'',
                tipo:'Obra o Labor',cargo:'',fechaIngreso:'',salario:'',periodoPago:'Mensual',
                laborContratada:'',email:'',telefono:'',direccion:'',ciudad:'Barranquilla',
                institucionEducativa:'',fechaFin:'',horario:'',fechaNacimiento:'',fondoPensiones:'',
            };
            const [form, setForm] = useState(FORM0);
            const F = (k,v) => setForm(p=>({...p,[k]:v}));

            // Funciones fetch originales pero usando el mock
            const fetchContratos = useCallback(async () => {
                setLoading(true);
                try {
                    const [rA, rX] = await Promise.all([
                        fetch('/api/data/v9.2/cre3c_hs_administrativos',{headers:HDRS}),
                        fetch('/api/data/v9.2/cre3c_hs_auxiliareses',{headers:HDRS}),
                    ]);
                    const dA = rA.ok ? (await rA.json()).value||[] : [];
                    const dX = rX.ok ? (await rX.json()).value||[] : [];
                    const rC = await fetch('/api/data/v9.2/cr83c_contratoses',{headers:HDRS});
                    const dC = rC.ok ? (await rC.json()).value||[] : [];

                    const getInfo = (id, nombre) => {
                        let r = dC.find(c => c._cr83c_trabajador_directo_value===id || c._cr83c_trabajador_indirecto_value===id);
                        if (!r && nombre) r = dC.find(c => c.cr83c_trabajador && c.cr83c_trabajador.toLowerCase().trim()===nombre.toLowerCase().trim());
                        if (!r) return {estado:'Sin Contrato',contratoId:null,firmaTrabajador:null,tokenFirma:null};
                        const v = r.cr83c_estado_del_contrato;
                        let estado = 'Sin Contrato';
                        if (v===947230001) estado='Pendiente Firma';
                        if (v===947230002) estado='Firma Recibida';
                        if (v===947230003) estado='Aprobado';
                        if (v===947230004) estado='Rechazado';
                        return {estado, contratoId:r.cr83c_contratosid, firmaTrabajador:r.cr83c_firmatrabajadorimagen||null, tokenFirma:r.cr83c_url_temporal||null};
                    };

                    const mapEmp = (e, origen) => {
                        const nombre = `${e.cre3c_primer_nombre||''} ${e.cre3c_segundo_nombre||''} ${e.cre3c_primer_apellido||''} ${e.cre3c_segundo_apellido||''}`.replace(/\s+/,' ').trim();
                        const id = origen==='directo' ? e.cre3c_hs_administrativoid : e.cre3c_hs_auxiliaresid;
                        const info = getInfo(id, nombre);
                        let tipo = origen==='indirecto' ? 'OPS' : 'Obra o Labor';
                        if (origen==='directo' && e.cre3c_tipo_de_contrato===947230002) tipo='Aprendizaje';
                        if (origen==='directo' && e.cre3c_tipo_de_contrato===947230003) tipo='Término Indefinido';
                        return {
                            id, nombreCompleto:nombre, cedula:String(e.cre3c_numero_de_documento||'').trim(),
                            tipo, cargo:e.cre3c_cargo||'Sin cargo',
                            fechaIngreso:e.cre3c_fecha_de_inicio||e.cr83c_fecha_de_inicio||'',
                            salario:e.cr83c_salario||e.cre3c_salario||'',
                            periodoPago:origen==='indirecto'?'1 vez al mes (mes vencido)':'Mensual',
                            email:e.cre3c_correo_electronico||'', telefono:e.cre3c_numero_de_telefono||'',
                            direccion:e.cre3c_direccion_residencial||'',
                            ciudad:e.cre3c_ciudad_donde_presta_el_servicio||'Barranquilla',
                            origen, laborContratada:'', horario:'', fechaNacimiento:'', fondoPensiones:'',
                            ...info,
                        };
                    };

                    const lista = [
                        ...dA.map(e=>mapEmp(e,'directo')),
                        ...dX.map(e=>mapEmp(e,'indirecto')),
                    ].filter(e=>e.cedula!=='').sort((a,b)=>new Date(b.fechaIngreso)-new Date(a.fechaIngreso));
                    setContratos(lista);
                } catch(err){ console.error(err); }
                finally { setLoading(false); }
            }, []);

            useEffect(()=>{ fetchContratos(); },[fetchContratos]);

            const handleBuscarCedula = async () => {
                if (!busqCedula.trim()) return;
                setBuscando(true);
                try {
                    const [rA,rX] = await Promise.all([
                        fetch(`/api/data/v9.2/cre3c_hs_administrativos?$filter=cre3c_numero_de_documento eq '${busqCedula}'`,{headers:HDRS}),
                        fetch(`/api/data/v9.2/cre3c_hs_auxiliareses?$filter=cre3c_numero_de_documento eq '${busqCedula}'`,{headers:HDRS}),
                    ]);
                    const dA = await rA.json(), dX = await rX.json();
                    let emp=null, origen='';
                    if (dA.value?.length>0){ emp=dA.value[0]; origen='directo'; }
                    else if (dX.value?.length>0){ emp=dX.value[0]; origen='indirecto'; }
                    if (emp) {
                        let tipo = origen==='indirecto'?'OPS':'Obra o Labor';
                        if (origen==='directo'&&emp.cre3c_tipo_de_contrato===947230002) tipo='Aprendizaje';
                        if (origen==='directo'&&emp.cre3c_tipo_de_contrato===947230003) tipo='Término Indefinido';
                        setForm(p=>({...p,
                            idDataverse: origen==='directo'?emp.cre3c_hs_administrativoid:emp.cre3c_hs_auxiliaresid,
                            tablaOrigen: origen, cedula: emp.cre3c_numero_de_documento||busqCedula,
                            nombreCompleto: `${emp.cre3c_primer_nombre||''} ${emp.cre3c_segundo_nombre||''} ${emp.cre3c_primer_apellido||''} ${emp.cre3c_segundo_apellido||''}`.replace(/\s+/,' ').trim(),
                            cargo: emp.cre3c_cargo||'', salario: emp.cr83c_salario||emp.cre3c_salario||'',
                            fechaIngreso: fmtInput(emp.cre3c_fecha_de_inicio||emp.cr83c_fecha_de_inicio),
                            tipo, email: emp.cre3c_correo_electronico||'', telefono: emp.cre3c_numero_de_telefono||'',
                            direccion: emp.cre3c_direccion_residencial||'',
                            ciudad: emp.cre3c_ciudad_donde_presta_el_servicio||'Barranquilla',
                            institucionEducativa: emp.cre3c_institucion_educativa||'',
                        }));
                    } else {
                        setForm(p=>({...p, cedula:busqCedula, idDataverse:'', tablaOrigen:''}));
                        alert('Empleado no encontrado. Completa los datos manualmente.');
                    }
                } catch(e){ console.error(e); }
                finally { setBuscando(false); }
            };

            const handleGuardar = async (e) => {
                e.preventDefault();
                if (!form.cedula || !form.nombreCompleto){ alert('Completa los datos mínimos.'); return; }
                setGuardando(true);
                try {
                    const esOPS = form.tipo==='OPS';
                    const ep = esOPS ? '/api/data/v9.2/cre3c_hs_auxiliareses' : '/api/data/v9.2/cre3c_hs_administrativos';
                    const noms = form.nombreCompleto.trim().split(' ');
                    const payload = {
                        cre3c_numero_de_documento: String(form.cedula),
                        cre3c_primer_nombre: noms[0]||'', cre3c_primer_apellido: noms.slice(1).join(' ')||'',
                        cre3c_cargo: form.cargo, cr83c_salario: String(form.salario),
                        cr83c_fecha_de_inicio: form.fechaIngreso, cre3c_correo_electronico: form.email,
                    };
                    let idEmp = form.idDataverse;
                    if (form.idDataverse) {
                        await fetch(`${ep}(${form.idDataverse})`,{method:'PATCH',headers:HDRS,body:JSON.stringify(payload)});
                    } else {
                        const res = await fetch(ep,{method:'POST',headers:HDRS,body:JSON.stringify(payload)});
                        const loc = res.headers.get('OData-EntityId')||'';
                        const m = loc.match(/\(([^)]+)\)/);
                        if (m) idEmp = m[1];
                    }
                    await fetch('/api/data/v9.2/cr83c_contratoses',{
                        method:'POST',headers:HDRS,
                        body:JSON.stringify({
                            cr83c_trabajador: form.nombreCompleto,
                            cr83c_estado_del_contrato: 947230001,
                            ...(esOPS
                                ? {'cr83c_trabajador_indirecto@odata.bind':`/cre3c_hs_auxiliareses(${idEmp})`}
                                : {'cr83c_trabajador_directo@odata.bind':`/cre3c_hs_administrativos(${idEmp})`}
                            ),
                        }),
                    });
                    await fetchContratos();
                    setForm(FORM0); setBusqCedula(''); setModalGenerar(false);
                    alert('✅ Contrato guardado. Usa el botón "Enviar" para enviar el link de firma al trabajador.');
                } catch(err){ alert('Error al guardar. Verifica Dataverse.'); }
                finally { setGuardando(false); }
            };

            const handleEnviar = async (contrato) => {
                if (!contrato.email){ alert('⚠️ El empleado no tiene email registrado.'); return; }
                setEnviando(true);
                try {
                    await fetch(PA_ENVIAR_CONTRATO,{
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({
                            empleadoId:contrato.id, origen:contrato.origen,
                            nombreCompleto:contrato.nombreCompleto, cedula:contrato.cedula,
                            cargo:contrato.cargo, tipo:contrato.tipo, email:contrato.email,
                            fechaIngreso:contrato.fechaIngreso, salario:contrato.salario,
                            periodoPago:contrato.periodoPago, laborContratada:contrato.laborContratada||'',
                            ciudad:contrato.ciudad||'Barranquilla',
                        }),
                    });
                    alert(`📧 Contrato enviado a ${contrato.email}`);
                    await fetchContratos();
                } catch(err){ alert('Error al enviar. Verifica Power Automate.'); }
                finally { setEnviando(false); }
            };

            const handleRechazar = async () => {
                if (!motivo.trim()){ alert('Escribe el motivo del rechazo.'); return; }
                setRechazando(true);
                try {
                    if (contratoRech.contratoId) {
                        await fetch(`/api/data/v9.2/cr83c_contratoses(${contratoRech.contratoId})`,{
                            method:'PATCH',headers:HDRS,body:JSON.stringify({cr83c_estado_del_contrato:947230004}),
                        });
                    }
                    await fetch(PA_RECHAZAR,{
                        method:'POST',headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({email:contratoRech.email,nombreCompleto:contratoRech.nombreCompleto,cargo:contratoRech.cargo,motivo}),
                    });
                    setModalRechazar(false); setContratoRech(null); setMotivo('');
                    setModalVer(null);
                    alert(`❌ Contrato rechazado. Notificación enviada a ${contratoRech.email}.`);
                    await fetchContratos();
                } catch(err){ alert('Error al rechazar.'); }
                finally { setRechazando(false); }
            };

            const registros = contratos.filter(c=>{
                const q = busqueda.toLowerCase();
                return (c.nombreCompleto+c.cedula+c.cargo).toLowerCase().includes(q)
                    && (filtroTipo==='Todos' || c.tipo===filtroTipo)
                    && (filtroEstado==='Todos' || c.estado===filtroEstado);
            });
            const totalPags = Math.max(1, Math.ceil(registros.length/POR_PAG));
            const slice = registros.slice((pagina-1)*POR_PAG, pagina*POR_PAG);
            const stats = {
                total: contratos.length,
                sin:   contratos.filter(c=>c.estado==='Sin Contrato').length,
                pend:  contratos.filter(c=>c.estado==='Pendiente Firma').length,
                rec:   contratos.filter(c=>c.estado==='Firma Recibida').length,
                apr:   contratos.filter(c=>c.estado==='Aprobado').length,
            };

            return (
                <div style={{display:'flex',height:'100vh',width:'100%',backgroundColor:C.light,fontFamily:'"Segoe UI",system-ui,sans-serif',overflow:'hidden'}}>
                    {/* Sidebar */}
                    <aside style={{width:'240px',minWidth:'240px',background:'#fff',borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',padding:'24px 16px',zIndex:5}}>
                        <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'40px',padding:'0 6px'}}>
                            <div style={{background:C.grad,width:'40px',height:'40px',borderRadius:'12px',display:'flex',justifyContent:'center',alignItems:'center',color:'#fff',fontWeight:900,fontSize:'15px',flexShrink:0}}>HS</div>
                            <div><div style={{fontWeight:800,fontSize:'15px',color:C.dark,lineHeight:1.2}}>Hogar Salud</div><div style={{fontSize:'11px',color:C.gray}}>IPS SAS</div></div>
                        </div>
                        <nav style={{display:'flex',flexDirection:'column',gap:'4px'}}>
                            {NAV.map(n=>(
                                <div key={n.name} className={`nav-i${n.name==='Contratos'?' on':''}`}>{n.ico} {n.name}</div>
                            ))}
                        </nav>
                    </aside>

                    {/* Main content */}
                    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
                        <header style={{height:'68px',minHeight:'68px',background:'#fff',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',gap:'16px',flexShrink:0}}>
                            <div><h1 style={{margin:0,fontSize:'17px',fontWeight:800,color:C.dark}}>Gestión de Contratos</h1><p style={{margin:0,fontSize:'12px',color:C.gray}}>Hogar Salud IPS SAS</p></div>
                            <div style={{display:'flex',gap:'10px'}}>
                                <button className="btn-s" onClick={fetchContratos} disabled={loading}>{Ico.Refresh} Actualizar</button>
                                <button className="btn-p" onClick={()=>{setForm(FORM0);setBusqCedula('');setModalGenerar(true);}}>{Ico.Plus} Generar Contrato</button>
                            </div>
                        </header>

                        <main style={{flex:1,overflowY:'auto',padding:'24px 32px',background:C.light}}>
                            <div style={{display:'flex',gap:'12px',marginBottom:'22px',flexWrap:'wrap'}}>
                                {[
                                    {l:'Total Personal', v:stats.total, co:C.cyan, bg:'#e0f9fb'},
                                    {l:'Sin Contrato', v:stats.sin, co:C.gray, bg:'#f1f5f9'},
                                    {l:'Pendiente Firma', v:stats.pend, co:C.yellow, bg:C.yellowBg},
                                    {l:'Firma Recibida 🔔', v:stats.rec, co:C.orange, bg:C.orangeBg},
                                    {l:'Aprobados ✓', v:stats.apr, co:C.green, bg:C.greenBg},
                                ].map(s=>(
                                    <div key={s.l} style={{background:'#fff',border:`1px solid ${C.border}`,borderRadius:'14px',padding:'14px 18px',flex:1,minWidth:0,borderTop:`3px solid ${s.co}`}}>
                                        <div style={{fontSize:'24px',fontWeight:900,color:s.co}}>{s.v}</div>
                                        <div style={{fontSize:'11px',color:C.gray,fontWeight:600,marginTop:'2px'}}>{s.l}</div>
                                    </div>
                                ))}
                            </div>

                            <div style={{display:'flex',gap:'12px',marginBottom:'18px',flexWrap:'wrap',alignItems:'center'}}>
                                <div style={{position:'relative',flex:1,minWidth:'220px'}}>
                                    <span style={{position:'absolute',left:'12px',top:'50%',transform:'translateY(-50%)',color:'#94a3b8'}}>{Ico.Search}</span>
                                    <input className="inp" style={{paddingLeft:'36px'}} placeholder="Nombre, cédula o cargo..." value={busqueda} onChange={e=>{setBusqueda(e.target.value);setPagina(1);}}/>
                                </div>
                                <select className="inp" style={{minWidth:'180px',flex:'none'}} value={filtroTipo} onChange={e=>{setFiltroTipo(e.target.value);setPagina(1);}}>
                                    <option value="Todos">Todos los tipos</option>
                                    {TIPOS.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
                                </select>
                                <select className="inp" style={{minWidth:'170px',flex:'none'}} value={filtroEstado} onChange={e=>{setFiltroEstado(e.target.value);setPagina(1);}}>
                                    <option value="Todos">Todos los estados</option>
                                    {Object.keys(ESTADO_META).map(k=><option key={k} value={k}>{k}</option>)}
                                </select>
                            </div>

                            {loading ? (
                                <div style={{textAlign:'center',padding:'70px',color:C.cyan}}><div style={{fontSize:'32px',marginBottom:'12px'}}>⟳</div><div style={{fontWeight:700}}>Sincronizando con Dataverse...</div></div>
                            ) : slice.length===0 ? (
                                <div style={{background:'#fff',border:`1px dashed ${C.border}`,borderRadius:'16px',padding:'60px',textAlign:'center'}}><div style={{fontSize:'40px',marginBottom:'12px'}}>📭</div><p style={{color:C.gray,fontSize:'13px'}}>No se encontraron registros con los filtros actuales.</p></div>
                            ) : (
                                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                                    {slice.map(c=>{
                                        const tc = TIPO_COLOR[c.tipo]||TIPO_COLOR['Obra o Labor'];
                                        return (
                                            <div key={c.id} className="row-card" style={{borderLeftColor:c.estado==='Firma Recibida'?C.orange:tc.color}}>
                                                <div style={{minWidth:0}}>
                                                    <div style={{fontWeight:800,fontSize:'14px',color:C.dark,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:'3px'}}>{c.nombreCompleto}</div>
                                                    <div style={{fontSize:'12px',color:C.gray,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>CC {c.cedula}{c.email ? ` · ${c.email}` : ''}</div>
                                                </div>
                                                <div style={{background:C.light,padding:'8px 12px',borderRadius:'8px',border:`1px solid ${C.border}`,minWidth:0}}>
                                                    <div style={{fontWeight:700,fontSize:'13px',color:C.dark,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.cargo}</div>
                                                    <div style={{fontSize:'11px',color:C.gray,marginTop:'2px'}}>{fmtDate(c.fechaIngreso)||'Sin fecha'}</div>
                                                </div>
                                                <div style={{display:'flex',alignItems:'center',gap:'6px',flexShrink:0,flexWrap:'wrap',justifyContent:'flex-end'}}>
                                                    <TipoBadge tipo={c.tipo}/>
                                                    <EstadoBadge estado={c.estado}/>
                                                    {c.estado==='Sin Contrato' && (
                                                        <button className="btn-g" onClick={()=>handleEnviar(c)} disabled={enviando} title="Enviar link de firma al trabajador">{Ico.Send} Enviar</button>
                                                    )}
                                                    <button className="btn-s" style={{padding:'7px 10px'}} onClick={()=>setModalVer(c)} title="Ver documento">{Ico.Eye} Ver</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            {!loading && totalPags>1 && (
                                <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:'6px',marginTop:'24px'}}>
                                    <button className="pg-btn" onClick={()=>setPagina(p=>Math.max(1,p-1))} disabled={pagina===1}>‹</button>
                                    {Array.from({length:Math.min(totalPags,7)},(_,i)=>{
                                        let p=i+1;
                                        if(totalPags>7){if(pagina<=4)p=i+1;else if(pagina>=totalPags-3)p=totalPags-6+i;else p=pagina-3+i;}
                                        return <button key={p} className={`pg-btn${pagina===p?' on':''}`} onClick={()=>setPagina(p)}>{p}</button>;
                                    })}
                                    <button className="pg-btn" onClick={()=>setPagina(p=>Math.min(totalPags,p+1))} disabled={pagina===totalPags}>›</button>
                                    <span style={{fontSize:'12px',color:C.gray,marginLeft:'8px'}}>{registros.length} registros</span>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* MODAL GENERAR CONTRATO */}
                    {modalGenerar && (
                        <div className="overlay no-print" onClick={e=>{if(e.target===e.currentTarget)setModalGenerar(false);}}>
                            <div className="modal" style={{maxWidth:'700px',padding:'28px 32px'}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
                                    <div><h2 style={{margin:0,fontSize:'18px',fontWeight:800,color:C.dark}}>Generar Nuevo Contrato</h2><p style={{margin:'4px 0 0',fontSize:'12px',color:C.gray}}>Busca por cédula para autocargar datos de Dataverse. Todos los campos son editables.</p></div>
                                    <button onClick={()=>setModalGenerar(false)} style={{background:'none',border:'none',cursor:'pointer',color:C.gray}}>{Ico.Close}</button>
                                </div>
                                <div style={{background:C.light,padding:'14px',borderRadius:'12px',border:`1px solid ${C.border}`,marginBottom:'18px'}}>
                                    <label className="lbl">🔍 Buscar empleado por cédula</label>
                                    <div style={{display:'flex',gap:'8px',marginTop:'6px'}}>
                                        <input className="inp" style={{flex:1}} type="number" value={busqCedula} onChange={e=>setBusqCedula(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleBuscarCedula();}} placeholder="Número de documento..."/>
                                        <button className="btn-p" onClick={handleBuscarCedula} disabled={buscando} style={{flexShrink:0}}>{buscando?'...':'Buscar'}</button>
                                    </div>
                                    {form.idDataverse && <div style={{marginTop:'8px',color:C.green,fontSize:'12px',fontWeight:700}}>✅ Datos cargados desde Dataverse</div>}
                                </div>
                                <form onSubmit={handleGuardar}>
                                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'13px',marginBottom:'14px'}}>
                                        <div style={{gridColumn:'1/-1'}}><label className="lbl">Nombre Completo *</label><input required className="inp" value={form.nombreCompleto} onChange={e=>F('nombreCompleto',e.target.value)} placeholder="Nombres y apellidos completos"/></div>
                                        <div><label className="lbl">Cédula *</label><input required className="inp" value={form.cedula} onChange={e=>F('cedula',e.target.value)} placeholder="Número de documento"/></div>
                                        <div><label className="lbl">Tipo de Contrato *</label><select required className="inp" value={form.tipo} onChange={e=>F('tipo',e.target.value)}>{TIPOS.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}</select></div>
                                        <div><label className="lbl">Cargo *</label><input required className="inp" value={form.cargo} onChange={e=>F('cargo',e.target.value)} placeholder="Ej. Gestor de Servicios, Médico General"/></div>
                                        <div><label className="lbl">Fecha de Inicio *</label><input required className="inp" type="date" value={form.fechaIngreso} onChange={e=>F('fechaIngreso',e.target.value)}/></div>
                                        <div><label className="lbl">{form.tipo==='Aprendizaje'?'Auxilio Económico':form.tipo==='OPS'?'Remuneración':'Salario'} *</label><input required className="inp" value={form.salario} onChange={e=>F('salario',e.target.value)} placeholder="$1.750.905 o Conforme a Tarifas"/></div>
                                        <div><label className="lbl">Periodo de Pago *</label><input required className="inp" value={form.periodoPago} onChange={e=>F('periodoPago',e.target.value)} placeholder="Mensual, Quincenal..."/></div>
                                        <div><label className="lbl">Email *</label><input required className="inp" type="email" value={form.email} onChange={e=>F('email',e.target.value)} placeholder="correo@ejemplo.com"/></div>
                                        <div><label className="lbl">Teléfono</label><input className="inp" value={form.telefono} onChange={e=>F('telefono',e.target.value)} placeholder="300 000 0000"/></div>
                                        <div><label className="lbl">Dirección</label><input className="inp" value={form.direccion} onChange={e=>F('direccion',e.target.value)} placeholder="Calle / Carrera #..."/></div>
                                        <div><label className="lbl">Ciudad</label><input className="inp" value={form.ciudad} onChange={e=>F('ciudad',e.target.value)} placeholder="Barranquilla"/></div>
                                        <div><label className="lbl">Lugar, fecha de nacimiento</label><input className="inp" value={form.fechaNacimiento} onChange={e=>F('fechaNacimiento',e.target.value)} placeholder="Ej. Barranquilla, 15 de marzo de 1990"/></div>
                                        {(form.tipo==='Obra o Labor'||form.tipo==='Término Indefinido') && (<div style={{gridColumn:'1/-1'}}><label className="lbl">Labor Contratada</label><textarea className="inp" rows="2" style={{resize:'vertical'}} value={form.laborContratada} onChange={e=>F('laborContratada',e.target.value)} placeholder="Las consignadas en el presente contrato y las inherentes al cargo de..."/></div>)}
                                        {form.tipo==='Término Indefinido' && (<><div><label className="lbl">Horario</label><input className="inp" value={form.horario} onChange={e=>F('horario',e.target.value)} placeholder="7AM a 12M - 2PM a 5PM L a V"/></div><div><label className="lbl">Fondo de Pensiones</label><input className="inp" value={form.fondoPensiones} onChange={e=>F('fondoPensiones',e.target.value)} placeholder="PORVENIR, COLFONDOS..."/></div></>)}
                                        {form.tipo==='Aprendizaje' && (<><div><label className="lbl">Institución Educativa</label><input className="inp" value={form.institucionEducativa} onChange={e=>F('institucionEducativa',e.target.value)} placeholder="SENA, INCATEC..."/></div><div><label className="lbl">Fecha de Terminación</label><input className="inp" type="date" value={form.fechaFin} onChange={e=>F('fechaFin',e.target.value)}/></div></>)}
                                    </div>
                                    <div style={{display:'flex',justifyContent:'flex-end',gap:'10px',borderTop:`1px solid ${C.border}`,paddingTop:'14px'}}>
                                        <button type="button" className="btn-s" onClick={()=>setModalGenerar(false)}>Cancelar</button>
                                        <button type="submit" className="btn-p" disabled={guardando}>{guardando?'Guardando...':'💾 Guardar Contrato'}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL VER DOCUMENTO */}
                    {modalVer && (
                        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setModalVer(null);}}>
                            <div className="modal no-print" style={{maxWidth:'880px'}}>
                                <div style={{padding:'18px 26px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#fff',zIndex:2,borderRadius:'16px 16px 0 0'}}>
                                    <div><div style={{fontWeight:800,fontSize:'15px',color:C.dark}}>{modalVer.tipo} — Hogar Salud IPS SAS</div><div style={{fontSize:'12px',color:C.gray,marginTop:'3px',display:'flex',alignItems:'center',gap:'8px'}}>{modalVer.nombreCompleto} &nbsp;|&nbsp; <EstadoBadge estado={modalVer.estado}/></div></div>
                                    <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                                        <button className="btn-s" onClick={()=>window.print()}>{Ico.Print} Imprimir</button>
                                        {modalVer.estado==='Sin Contrato' && (<button className="btn-g" onClick={()=>handleEnviar(modalVer)} disabled={enviando}>{Ico.Send} {enviando?'Enviando...':'Enviar Contrato'}</button>)}
                                        {modalVer.estado==='Firma Recibida' && (<button className="btn-r" onClick={()=>{setContratoRech(modalVer);setMotivo('');setModalRechazar(true);}}>{Ico.X} Rechazar</button>)}
                                        <button onClick={()=>setModalVer(null)} style={{background:'none',border:'none',cursor:'pointer',color:C.gray,padding:'4px'}}>{Ico.Close}</button>
                                    </div>
                                </div>
                                {modalVer.estado==='Firma Recibida' && (<div style={{background:'#fff7ed',borderBottom:'1px solid #fed7aa',padding:'12px 26px',fontSize:'13px',color:'#92400e'}}>🔔 <strong>Este contrato fue firmado por el trabajador.</strong> Para aprobar, el flujo de Power Automate debe enviar la notificación a Álvaro. Puedes rechazarlo usando el botón de arriba.</div>)}
                                <div style={{padding:'24px 28px 32px',background:'#f0f4f8'}}>
                                    <div className="doc-paper">
                                        {modalVer.tipo==='Obra o Labor'       && <PlantillaObraLabor   c={modalVer} firmaRRHH={modalVer.estado==='Aprobado'?modalVer.firmaRRHH||null:null} firmaTrabajador={modalVer.firmaTrabajador}/>}
                                        {modalVer.tipo==='Término Indefinido' && <PlantillaIndefinido  c={modalVer} firmaRRHH={modalVer.estado==='Aprobado'?modalVer.firmaRRHH||null:null} firmaTrabajador={modalVer.firmaTrabajador}/>}
                                        {modalVer.tipo==='Aprendizaje'        && <PlantillaAprendizaje c={modalVer} firmaRRHH={modalVer.estado==='Aprobado'?modalVer.firmaRRHH||null:null} firmaTrabajador={modalVer.firmaTrabajador}/>}
                                        {modalVer.tipo==='OPS'                && <PlantillaOPS         c={modalVer} firmaRRHH={modalVer.estado==='Aprobado'?modalVer.firmaRRHH||null:null} firmaTrabajador={modalVer.firmaTrabajador}/>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL RECHAZAR */}
                    {modalRechazar && contratoRech && (
                        <div className="overlay no-print" onClick={e=>{if(e.target===e.currentTarget)setModalRechazar(false);}}>
                            <div className="modal" style={{maxWidth:'460px',padding:'28px 32px'}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'}}><h2 style={{margin:0,fontSize:'18px',fontWeight:800,color:C.red}}>Rechazar Contrato</h2><button onClick={()=>setModalRechazar(false)} style={{background:'none',border:'none',cursor:'pointer',color:C.gray}}>{Ico.Close}</button></div>
                                <div style={{background:C.light,borderRadius:'10px',padding:'14px',marginBottom:'16px'}}><div style={{fontWeight:700,color:C.dark}}>{contratoRech.nombreCompleto}</div><div style={{fontSize:'12px',color:C.gray,marginTop:'3px'}}>{contratoRech.cargo} · {contratoRech.tipo}</div></div>
                                <div style={{marginBottom:'16px'}}><label className="lbl">Motivo del rechazo *</label><textarea className="inp" rows="4" style={{resize:'vertical'}} value={motivo} onChange={e=>setMotivo(e.target.value)} placeholder="Este mensaje se enviará al trabajador por correo..."/></div>
                                <div style={{background:C.redBg,border:'1px solid #fca5a5',borderRadius:'8px',padding:'11px',fontSize:'12px',color:C.red,marginBottom:'16px'}}>⚠️ El estado cambiará a <strong>Rechazado</strong> y se notificará al trabajador.</div>
                                <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>
                                    <button className="btn-s" onClick={()=>setModalRechazar(false)}>Cancelar</button>
                                    <button className="btn-r" onClick={handleRechazar} disabled={!motivo.trim()||rechazando} style={{padding:'10px 20px',fontSize:'13px',opacity:motivo.trim()?1:0.5}}>{rechazando?'Rechazando...':`${Ico.X} Confirmar Rechazo`}</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Inyectar estilos globales de botones y clases que se usan en el código (estilos no inline)
        const styleSheet = document.createElement("style");
        styleSheet.textContent = `
            .nav-i{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:${C.gray};transition:all .15s}
            .nav-i:hover{background:#f8fafc;color:${C.dark}}
            .nav-i.on{background:${C.cyan};color:#fff}
            .btn-p{background:${C.grad};color:#fff;border:none;padding:9px 16px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .2s}
            .btn-p:hover{opacity:.88} .btn-p:disabled{opacity:.45;cursor:not-allowed}
            .btn-s{background:#f1f5f9;color:${C.dark};border:1px solid ${C.border};padding:8px 14px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
            .btn-s:hover{background:#e2e8f0}
            .btn-g{background:#16a34a;color:#fff;border:none;padding:7px 13px;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
            .btn-g:hover{opacity:.88}
            .btn-r{background:${C.red};color:#fff;border:none;padding:7px 13px;border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
            .btn-r:hover{opacity:.88}
            .inp{width:100%;padding:10px 12px;border:1px solid ${C.border};border-radius:8px;font-size:13px;box-sizing:border-box;font-family:inherit;outline:none}
            .inp:focus{border-color:${C.cyan};box-shadow:0 0 0 3px rgba(0,188,212,.12)}
            .lbl{font-size:12px;font-weight:700;color:${C.dark};display:block;margin-bottom:4px}
            .overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:100;display:flex;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
            .modal{background:#fff;border-radius:16px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.22)}
            .doc-paper{background:#fff;padding:36px 44px;border:1px solid #ddd;border-radius:4px;box-shadow:0 4px 8px rgba(0,0,0,.08)}
            .row-card{background:#fff;border-radius:12px;padding:12px 16px;border:1px solid ${C.border};display:grid;grid-template-columns:minmax(0,1.4fr) minmax(0,1.2fr) auto;align-items:center;gap:12px;border-left-width:4px;border-left-style:solid;transition:box-shadow .18s}
            .row-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.07)}
            .pg-btn{width:32px;height:32px;border-radius:7px;border:1px solid ${C.border};background:#fff;cursor:pointer;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;color:${C.dark}}
            .pg-btn:hover,.pg-btn.on{background:${C.cyan};color:#fff;border-color:${C.cyan}}
            @media print{.no-print{display:none!important}.doc-paper{box-shadow:none;border:none;padding:0}}
        `;
        document.head.appendChild(styleSheet);

        ReactDOM.createRoot(document.getElementById("root")).render(<ContratosScreen />);
    </script>
</body>
</html>
